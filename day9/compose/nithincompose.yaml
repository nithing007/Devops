
services:
  web:
    image: httpd:latest
    container_name: my-httpd
    ports:
      - "85:80"
    volumes:
      - ./html:/usr/local/apache2/htdocs

  db:
    image: mysql:latest
    container_name: my-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: